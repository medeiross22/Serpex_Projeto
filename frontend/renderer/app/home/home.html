<!DOCTYPE html>
<html lang="pt-br">

<body>

  <!-- HEADER -->

      <p class="slogan">Seja dono da sua segurança</p>

    <!-- Centro -->
    <div class="header-center">
      <img src="img/logo serpex branca.png" class="logo">

    <!-- Direita -->
<div class="header-right" onclick="irPerfil()">

</div>

  </header>

  <!-- MAIN -->
  <main class="main">

      <h2>Bem-vindo!</h2>

        Prepare-se para testar e evoluir seus conhecimentos em cibersegurança.
        Enfrente simulações e torne-se mais seguro no mundo digital.

    </div>

    <!-- Botão / Flashcard -->

      <p>Iniciar Simulações</p>
    </div>

  </main>
<script src="home.js"></script>
