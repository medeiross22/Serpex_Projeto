<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login - Serpex</title>
  <link rel="stylesheet" href="login.css">
</head>

<body>

  <div class="container">

    <div class="card-login">

      <img src="img/serpex logo preta .png" class="logo">

      <h1 class="titulo">Serpex Security</h1>

      <input type="email" id="email" placeholder="Email">
      <input type="password" id="senha" placeholder="Senha">

      <button onclick="fazerLogin()">Entrar</button>

      <p id="mensagem"></p>

    <p class="link-cadastro" onclick="irParaCadastro()">
    Não tem conta? Cadastre-se
    </p>


    </div>

  </div>

  <script src="./login.js"></script>

</body>
</html>
