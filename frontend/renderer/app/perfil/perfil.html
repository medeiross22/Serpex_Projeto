<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Perfil</title>
  <link rel="stylesheet" href="perfil.css">
</head>

<body>

  <!-- HEADER -->
<div class="header">

  <button class="voltar" onclick="voltarHome()">←</button>

<div class="logo-center">
  <img src="logo serpex branca.png" alt="logo">
  <p>Serpex Security</p>
</div>
  <div class="user-info">
    <div class="img"></div>

    <div class="info">
      <p class="nome">Nome do Usuário</p>
      <button class="editar">Editar</button>
    </div>
  </div>

</div>

  <!-- MAIN -->
  <div class="main">

    <div class="progresso-box">

      <div class="progresso-left">
        <p class="titulo">PROGRESSO</p>
        <div class="barra">
          <div class="barra-preenchida"></div>
        </div>
      </div>

      <div class="nivel">
        <p>Nível</p>
        <span>0</span>
      </div>

    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">

    <p class="titulo-footer">Módulos feitos</p>

    <ul class="modulos">
      <li>Módulo 1</li>
      <li>Módulo 2</li>
    </ul>

  </div>
<script src="perfil.js"></script>

</body>
</html>
